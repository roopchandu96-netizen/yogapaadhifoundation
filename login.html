<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Yoga Paadhi Foundation</title>
  <meta name="description" content="Sign in to your Yoga Paadhi Foundation account to access live classes, meditation sessions, and personalized therapy plans.">
  <link rel="icon" type="image/png" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧘</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-body" style="background-image: url('assets/hero-bg.jpg');">

  <div class="auth-card">
    <a href="index.html" class="back-home-link">
      <i class="fas fa-arrow-left"></i> Back to Home
    </a>
    
    <div class="auth-header">
      <a href="index.html" class="logo">
        <img src="assets/logo.png" alt="Yoga Paadhi Logo" class="logo-img" style="height: 60px;">
      </a>
      <h2>Welcome Back</h2>
      <p>Enter your details to reconnect with your practice.</p>
    </div>

    <div class="auth-social">
      <button class="btn-social" onclick="alert('Google Auth Simulation: Integration successful!')">
        <i class="fab fa-google" style="color: #DB4437;"></i> Google
      </button>
      <button class="btn-social" onclick="alert('Apple Auth Simulation: Integration successful!')">
        <i class="fab fa-apple"></i> Apple
      </button>
    </div>

    <div class="auth-divider">
      <span>or continue with email</span>
    </div>

    <form onsubmit="event.preventDefault(); alert('Login Simulation: Success! Redirecting to your sanctuary...'); window.location.href='index.html';">
      <div class="form-group">
        <label for="loginEmail">Email Address</label>
        <input type="email" id="loginEmail" required placeholder="name@example.com">
      </div>
      
      <div class="form-group">
        <label for="loginPassword">Password</label>
        <input type="password" id="loginPassword" required placeholder="••••••••">
      </div>

      <div class="form-options">
        <label class="checkbox-label">
          <input type="checkbox" id="rememberMe"> Remember me
        </label>
        <a href="#" onclick="alert('Reset Password simulation: Check your email for resetting instructions.')">Forgot Password?</a>
      </div>

      <button type="submit" class="btn btn-primary btn-block">Sign In</button>
    </form>

    <div class="auth-footer">
      <p>Don't have an account yet? <a href="signup.html">Create Account</a></p>
    </div>
  </div>

</body>
</html>
