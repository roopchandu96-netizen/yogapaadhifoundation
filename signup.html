<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up | Yoga Paadhi Foundation</title>
  <meta name="description" content="Create your Yoga Paadhi Foundation account to register for classes, buy memberships, and start your holistic wellness journey.">
  <link rel="icon" type="image/png" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧘</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-body" style="background-image: url('assets/hero-bg.jpg');">

  <div class="auth-card">
    <a href="index.html" class="back-home-link">
      <i class="fas fa-arrow-left"></i> Back to Home
    </a>
    
    <div class="auth-header">
      <a href="index.html" class="logo">
        <img src="assets/logo.png" alt="Yoga Paadhi Logo" class="logo-img" style="height: 60px;">
      </a>
      <h2>Begin Your Journey</h2>
      <p>Create an account to start your holistic wellness path.</p>
    </div>

    <div class="auth-social">
      <button class="btn-social" onclick="alert('Google Sign Up Simulation: Integration successful!')">
        <i class="fab fa-google" style="color: #DB4437;"></i> Google
      </button>
      <button class="btn-social" onclick="alert('Apple Sign Up Simulation: Integration successful!')">
        <i class="fab fa-apple"></i> Apple
      </button>
    </div>

    <div class="auth-divider">
      <span>or continue with email</span>
    </div>

    <form onsubmit="event.preventDefault(); if (document.getElementById('signupPassword').value !== document.getElementById('signupConfirm').value) { alert('Passwords do not match.'); return; } alert('Registration Simulation: Account created successfully! Welcome to your sanctuary.'); window.location.href='index.html';">
      <div class="form-group">
        <label for="signupName">Full Name</label>
        <input type="text" id="signupName" required placeholder="Robert Jenkins">
      </div>

      <div class="form-group">
        <label for="signupEmail">Email Address</label>
        <input type="email" id="signupEmail" required placeholder="name@example.com">
      </div>
      
      <div class="form-group grid grid-2" style="gap: 1rem; margin-bottom: 0;">
        <div class="form-group">
          <label for="signupPassword">Password</label>
          <input type="password" id="signupPassword" required placeholder="••••••••">
        </div>
        <div class="form-group">
          <label for="signupConfirm">Confirm Password</label>
          <input type="password" id="signupConfirm" required placeholder="••••••••">
        </div>
      </div>

      <div class="form-options" style="margin-bottom: 1.5rem;">
        <label class="checkbox-label" style="text-align: left;">
          <input type="checkbox" id="termsCheck" required> I agree to the <a href="#">Terms of Service</a> &amp; <a href="#">Privacy Policy</a>
        </label>
      </div>

      <button type="submit" class="btn btn-primary btn-block">Create Account</button>
    </form>

    <div class="auth-footer">
      <p>Already have an account? <a href="login.html">Sign In</a></p>
    </div>
  </div>

</body>
</html>
